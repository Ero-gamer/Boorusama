name: Boorusama Premium APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # Force it to ignore the pre-installed 3.6.0
          flutter-version: '3.41.5' 
          cache: true

      - name: Sanitize SDK Constraints
        # In case the runner is stubborn, we force the pubspec to accept 
        # whatever Dart version is actually present.
        run: |
          sed -i 's/sdk: .*/sdk: ">=3.6.0 <4.0.0"/g' pubspec.yaml
          sed -i 's/flutter: .*/flutter: ">=3.0.0"/g' pubspec.yaml

      - name: Setup Environment Files
        run: |
          mkdir -p env
          touch .env
          echo '{}' > env/prod.json
          chmod +x gen.sh
          chmod +x build.sh

      - name: Inject Premium Status
        run: |
          sed -i "s/PremiumMode.hidden/PremiumMode.premium/g" lib/core/premiums/src/types/premium.dart
          sed -i "s/PremiumMode.free/PremiumMode.premium/g" lib/core/premiums/src/types/premium.dart
          sed -i "s/_ => PremiumMode.hidden/_ => PremiumMode.premium/g" lib/core/premiums/src/types/premium.dart

      - name: Resolve Workspace Dependencies
        run: flutter pub get

      - name: Run Code Generation
        run: ./gen.sh

      - name: Build FOSS-Premium Armv7a
        run: |
          ./build.sh apk --release -f prod -s \
            --target-platform android-arm \
            --dart-define=IS_FOSS_BUILD=true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Boorusama-Premium-v7a
          path: artifacts/*.apk
