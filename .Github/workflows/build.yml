name: Build

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.27.0
          cache: true

      - name: Prepare environment
        # We only chmod the scripts that actually exist in your root folder
        run: |
          mkdir -p env
          touch .env
          echo '{}' > env/prod.json
          echo '{}' > env/dev.json
          chmod +x gen.sh
          chmod +x build.sh

      - name: Force Premium Unlock
        # This edits the source code so the app thinks you are already Premium
        run: |
          sed -i "s/PremiumMode.hidden/PremiumMode.premium/g" lib/core/premiums/src/types/premium.dart
          sed -i "s/PremiumMode.free/PremiumMode.premium/g" lib/core/premiums/src/types/premium.dart
          sed -i "s/_ => PremiumMode.hidden/_ => PremiumMode.premium/g" lib/core/premiums/src/types/premium.dart

      - name: Generate Code
        # This triggers the developer's custom generation logic
        run: ./gen.sh

      - name: Build Armv7a FOSS APK
        # -s = FOSS (Strips proprietary code/trackers)
        # -f prod = Production flavor
        # --target-platform = armv7a only
        run: |
          ./build.sh apk --release -f prod -s \
            --target-platform android-arm \
            --dart-define=IS_FOSS_BUILD=true

      - name: Organize Artifact
        run: |
          mkdir -p final_output
          cp artifacts/*.apk final_output/Boorusama-Premium-v7a.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Boorusama-FOSS-Premium-v7a
          path: final_output/Boorusama-Premium-v7a.apk
