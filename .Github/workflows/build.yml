name: Boorusama Premium APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.41.0' 
          cache: true

      - name: Force Global Compatibility
        # This deletes old locks and forces every package to accept any 3.x SDK
        run: |
          find . -name "pubspec.lock" -delete
          find . -name "pubspec.yaml" -exec sed -i 's/sdk: .*/sdk: ">=3.0.0 <4.0.0"/g' {} +
          find . -name "pubspec.yaml" -exec sed -i 's/flutter: .*/flutter: ">=3.0.0"/g' {} +
          mkdir -p env
          touch .env
          echo '{}' > env/prod.json
          chmod +x gen.sh
          chmod +x build.sh

      - name: Inject Premium Status
        run: |
          sed -i "s/PremiumMode.hidden/PremiumMode.premium/g" lib/core/premiums/src/types/premium.dart
          sed -i "s/PremiumMode.free/PremiumMode.premium/g" lib/core/premiums/src/types/premium.dart
          sed -i "s/_ => PremiumMode.hidden/_ => PremiumMode.premium/g" lib/core/premiums/src/types/premium.dart

      - name: Resolve Workspace Dependencies
        # This is where the magic happens; with the locks gone and 
        # constraints lowered, it will finally stop complaining.
        run: flutter pub get

      - name: Run Code Generation
        run: ./gen.sh

      - name: Build FOSS-Premium Armv7a
        run: |
          ./build.sh apk --release -f prod -s \
            --target-platform android-arm \
            --dart-define=IS_FOSS_BUILD=true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Boorusama-Premium-v7a
          path: artifacts/*.apk
