name: Build

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.27.0
          cache: true

      - name: Install dependencies
        run: |
          flutter pub get
          flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build APK (Armv7a)
        run: |
          # --no-tree-shake-icons is sometimes needed for CI, removed for speed
          # --split-per-abi creates the specific armv7a file
          flutter build apk --release --target-platform android-arm --no-pub --dart-define-from-file env/dev.json -t lib/main.dart

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Boorusama-Armv7a-Unsigned
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
