name: Boorusama Premium APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: MANUALLY INSTALL FLUTTER 3.41 / DART 3.11
        # This bypasses the pre-installed 3.6.0 runner version entirely
        run: |
          git clone https://github.com/flutter/flutter.git -b stable $HOME/flutter
          echo "$HOME/flutter/bin" >> $GITHUB_PATH
          echo "$HOME/flutter/bin/cache/dart-sdk/bin" >> $GITHUB_PATH

      - name: Force All Pubspecs to 3.11
        # This ensures every sub-package matches your target version
        run: |
          find . -name "pubspec.yaml" -exec sed -i 's/sdk: .*/sdk: "^3.11.0"/g' {} +
          find . -name "pubspec.yaml" -exec sed -i 's/flutter: .*/flutter: "^3.41.0"/g' {} +
          find . -name "pubspec.lock" -delete
          mkdir -p env
          touch .env
          echo '{}' > env/prod.json
          chmod +x gen.sh
          chmod +x build.sh

      - name: Inject Premium Status
        run: |
          sed -i "s/PremiumMode.hidden/PremiumMode.premium/g" lib/core/premiums/src/types/premium.dart
          sed -i "s/PremiumMode.free/PremiumMode.premium/g" lib/core/premiums/src/types/premium.dart
          sed -i "s/_ => PremiumMode.hidden/_ => PremiumMode.premium/g" lib/core/premiums/src/types/premium.dart

      - name: Resolve Workspace
        run: flutter pub get

      - name: Run Code Generation
        run: ./gen.sh

      - name: Build FOSS-Premium Armv7a
        run: |
          ./build.sh apk --release -f prod -s \
            --target-platform android-arm \
            --dart-define=IS_FOSS_BUILD=true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Boorusama-Premium-v7a
          path: artifacts/*.apk
