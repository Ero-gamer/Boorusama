name: Boorusama Premium APK (Default Flavor)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.41.0' 
          cache: true

      - name: Version Audit & Doctor
        # This will tell us once and for all if the runner is lying about the SDK
        run: |
          flutter --version
          flutter doctor

      - name: Global Pubspec Patch
        # We target EVERY pubspec in the workspace to stop the version nagging
        run: |
          find . -name "pubspec.yaml" -exec sed -i 's/sdk: .*/sdk: ">=3.11.0 <4.0.0"/g' {} +
          find . -name "pubspec.yaml" -exec sed -i 's/flutter: .*/flutter: ">=3.41.0"/g' {} +
          find . -name "pubspec.lock" -delete
          mkdir -p env
          touch .env
          echo '{}' > env/prod.json
          chmod +x gen.sh
          chmod +x build.sh

      - name: Hard-Code Premium Status
        # Bypasses the payment check logic in the source code
        run: |
          sed -i "s/PremiumMode.hidden/PremiumMode.premium/g" lib/core/premiums/src/types/premium.dart
          sed -i "s/PremiumMode.free/PremiumMode.premium/g" lib/core/premiums/src/types/premium.dart
          sed -i "s/_ => PremiumMode.hidden/_ => PremiumMode.premium/g" lib/core/premiums/src/types/premium.dart

      - name: Resolve Workspace
        run: flutter pub get

      - name: Run Code Generation
        run: ./gen.sh

      - name: Build Standard Premium Armv7a
        # NOTICE: We REMOVED the -s flag. This is now the full "Default" flavor.
        # We still target armv7a for your Android hardware.
        run: |
          ./build.sh apk --release -f prod \
            --target-platform android-arm \
            --dart-define=IS_FOSS_BUILD=false

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Boorusama-Premium-Default-v7a
          path: artifacts/*.apk
