name: Build Armv7a APK

on:
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Armv7a Release APK
        run: ./gradlew assembleRelease -Pandroid.bundle.enableUncompressedNativeLibs=false
        # Note: To strictly limit the ABI output if the project doesn't have 
        # splits configured, we target the release build.

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Boorusama-armv7a-unsigned
          path: app/build/outputs/apk/release/*-release-unsigned.apk
