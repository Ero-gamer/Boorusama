name: Boorusama-Premium-Final

on:
  workflow_dispatch: # This allows you to press the button manually

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.27.0
          cache: true

      - name: Prepare Workspace
        # We ONLY touch the scripts in the root. NO gradlew.
        run: |
          mkdir -p env
          touch .env
          echo '{}' > env/prod.json
          chmod +x gen.sh
          chmod +x build.sh

      - name: Crack Premium Logic
        # This replaces 'free'/'hidden' with 'premium' in the source
        run: |
          sed -i "s/PremiumMode.hidden/PremiumMode.premium/g" lib/core/premiums/src/types/premium.dart
          sed -i "s/PremiumMode.free/PremiumMode.premium/g" lib/core/premiums/src/types/premium.dart
          sed -i "s/_ => PremiumMode.hidden/_ => PremiumMode.premium/g" lib/core/premiums/src/types/premium.dart

      - name: Generate Boilerplate
        run: ./gen.sh

      - name: Build Armv7a APK
        # We use -s for FOSS (no trackers) and target armv7a
        run: |
          ./build.sh apk --release -f prod -s \
            --target-platform android-arm \
            --dart-define=IS_FOSS_BUILD=true

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: Boorusama-Premium-v7a
          path: artifacts/*.apk
