name: Boorusama Premium APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          # Using the latest stable version to avoid "SDK version" errors
          flutter-version: 3.29.0 
          cache: true

      - name: Setup Workspace
        run: |
          mkdir -p env
          touch .env
          echo '{}' > env/prod.json
          chmod +x gen.sh
          chmod +x build.sh

      - name: Crack Premium Code
        run: |
          sed -i "s/PremiumMode.hidden/PremiumMode.premium/g" lib/core/premiums/src/types/premium.dart
          sed -i "s/PremiumMode.free/PremiumMode.premium/g" lib/core/premiums/src/types/premium.dart
          sed -i "s/_ => PremiumMode.hidden/_ => PremiumMode.premium/g" lib/core/premiums/src/types/premium.dart

      - name: Bootstrap Dependencies
        # This is the CRITICAL FIX: It fetches dependencies for all sub-packages
        # specifically 'codegen' and 'booru_clients' so the tools can see them.
        run: |
          flutter pub get
          cd packages/i18n && flutter pub get
          cd ../booru_clients && flutter pub get
          cd ../..

      - name: Run Code Generation
        # Now that dependencies are linked, gen.sh will find 'yaml' and 'codegen'
        run: ./gen.sh

      - name: Compile Armv7a APK
        # We target the 'prod' flavor with FOSS stripping
        run: |
          ./build.sh apk --release -f prod -s \
            --target-platform android-arm \
            --dart-define=IS_FOSS_BUILD=true

      - name: Upload Premium APK
        uses: actions/upload-artifact@v4
        with:
          name: Boorusama-Premium-v7a
          path: artifacts/*.apk
